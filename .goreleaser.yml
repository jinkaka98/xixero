project_name: xixero

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: xixero
    binary: xixero
    main: ./cmd/xixero
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.ShortCommit}}
      - -X main.Date={{.Date}}
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: xixero
    format: binary
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: jinkaka98
    name: xixero
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
