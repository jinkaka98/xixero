name: Deploy Web UI

on:
  push:
    branches: [main]
    paths:
      - "web-ui/**"

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install & Build (Public Mode)
        run: |
          cd web-ui
          npm ci
          VITE_PUBLIC_BUILD=true npm run build

      - name: Add 404.html for SPA routing
        run: cp web-ui/dist/index.html web-ui/dist/404.html

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web-ui/dist
